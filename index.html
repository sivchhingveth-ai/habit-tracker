<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="description" content="Buttress - High Density, Performance Focused" />
    <meta name="theme-color" content="#000000" />
    <!-- Apply saved theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('buttress_theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!-- Preload the self-hosted Geist Pixel font for faster first paint -->
    <link rel="preload" href="/fonts/GeistPixel-Variable.woff2" as="font" type="font/woff2" crossorigin>
    <title>Buttress</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
